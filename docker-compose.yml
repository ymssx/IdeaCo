version: '3.8'

services:
  # Main application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: idea-unlimited
    restart: unless-stopped
    ports:
      - "${PORT:-9999}:9999"
    environment:
      - NODE_ENV=production
    volumes:
      # Persist company data and workspace across restarts
      - app-data:/app/data
      - app-workspace:/app/workspace
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  app-data:
    driver: local
  app-workspace:
    driver: local
